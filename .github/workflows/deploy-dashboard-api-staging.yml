name: Deploy Dashboard API (Staging)

on:
  push:
    branches: [main]
    paths:
      - 'services/dashboard-api/**'
      - 'services/shared/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service_name: dashboard-api-service
      image_name: dashboard-api
      dockerfile_path: services/dashboard-api/Dockerfile
      deploy_type: services
      environment: staging
