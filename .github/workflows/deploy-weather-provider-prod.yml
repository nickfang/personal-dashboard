name: Deploy Weather Provider (Prod)

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service_name: weather-provider-service
      image_name: weather-provider
      dockerfile_path: services/weather-provider/Dockerfile
      deploy_type: services
      environment: production
