name: Deploy Service (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      deploy_type:
        required: true
        type: string # "services" or "jobs"
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Image
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/personal-dashboard/${{ inputs.image_name }}"
          IMAGE_TAG="${IMAGE}:${{ github.sha }}"

          docker build -t "$IMAGE_TAG" -f ${{ inputs.dockerfile_path }} services
          docker push "$IMAGE_TAG"

          docker tag "$IMAGE_TAG" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/personal-dashboard/${{ inputs.image_name }}"
          gcloud run ${{ inputs.deploy_type }} update ${{ inputs.service_name }} \
            --image "${IMAGE}:${{ github.sha }}" \
            --region ${{ vars.GCP_REGION }}
