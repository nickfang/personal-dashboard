name: Deploy Pollen Provider (Staging)

on:
  push:
    branches: [main]
    paths:
      - 'services/pollen-provider/**'
      - 'services/shared/**'

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service_name: pollen-provider-service
      image_name: pollen-provider
      dockerfile_path: services/pollen-provider/Dockerfile
      deploy_type: services
      environment: staging
    permissions:
      contents: read
      id-token: write